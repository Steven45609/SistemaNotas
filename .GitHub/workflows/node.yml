name: Node.js CI
on:
 push:
  branches:
    -main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Ejecutar archivo
        run: node index.js